<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RingMe - Retro Connection</title>
  <style>
    /* 1. อัปเกรด Palette สีให้เป็นสไตล์ Claude พาสเทลสดใส และปรับปรุง Typography */
    :root {
      --bg-pastel: #FFF0F6; /* สีพื้นหลังชมพูพาสเทลอ่อน */
      --card-bg: #FFFFFF;
      --primary: #FF85A2;   /* สีชมพูหลัก */
      --secondary: #B3E5FC; /* สีฟ้าพาสเทล */
      --accent: #D4EDDA;    /* สีเขียวมิ้นท์พาสเทล */
      --text-dark: #2B2D42;
      --text-muted: #8D99AE;
      --border-color: #F0E4DA;
      --shadow-color: #E0C3FC;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; }
    body { background: #1a1a2e; display: flex; justify-content: center; align-items: center; min-height: 100vh; overflow: hidden; }
    
    #app {
      width: 100%;
      max-width: 430px;
      height: 100vh;
      max-height: 932px;
      background: var(--bg-pastel);
      position: relative;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      color: var(--text-dark);
      box-shadow: 0 0 40px rgba(0,0,0,0.5);
    }

    /* ตกแต่ง Background Blobs ให้ฟุ้งละมุนยิ่งขึ้น */
    .blob {
      position: absolute; width: 350px; height: 350px;
      border-radius: 50%; filter: blur(70px); opacity: 0.5; z-index: 0;
    }
    .blob-1 { top: -80px; left: -80px; background: #FFC0CB; }
    .blob-2 { bottom: -80px; right: -80px; background: #98FB98; }

    #screen { flex: 1; overflow-y: auto; z-index: 1; padding: 20px; padding-bottom: 90px; }
    
    /* 2. ดีไซน์การ์ดและปุ่มกดให้มีความโค้งมนและมีมิติเงาหนา (Retro-Pop Style) */
    .card {
      background: var(--card-bg);
      border-radius: 24px;
      padding: 20px;
      margin-bottom: 20px;
      border: 2px solid var(--border-color);
      box-shadow: 0 8px 0 var(--border-color);
      position: relative;
      z-index: 1;
    }

    .btn {
      background: var(--primary);
      color: white;
      border: none;
      padding: 12px 24px;
      border-radius: 16px;
      font-weight: bold;
      cursor: pointer;
      box-shadow: 0 4px 0 #E05780;
      transition: all 0.1s ease;
      display: inline-block;
      text-align: center;
    }
    .btn:active { transform: translateY(4px); box-shadow: 0 0px 0 #E05780; }

    /* โครงสร้าง UI ชิ้นส่วนอื่นๆ */
    #nav {
      position: absolute; bottom: 0; left: 0; right: 0; height: 75px;
      background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(10px);
      display: flex; justify-content: space-around; align-items: center;
      border-top: 1px solid var(--border-color); z-index: 10; padding-bottom: 15px;
    }
    .nav-item { display: flex; flex-direction: column; align-items: center; font-size: 11px; color: var(--text-muted); cursor: pointer; }
    .nav-item.active { color: var(--primary); font-weight: bold; }
    .nav-item span { font-size: 22px; margin-bottom: 2px; }

    /* Rotary Dial Styles */
    .dial-container { display: flex; justify-content: center; margin: 20px 0; }
    .dial-wheel {
      width: 220px; height: 220px; border-radius: 50%;
      background: #333; border: 8px solid #444; position: relative;
      box-shadow: 0 10px 25px rgba(0,0,0,0.3); touch-action: none;
    }
    .dial-center-hole {
      position: absolute; top: 70px; left: 70px; width: 80px; height: 80px;
      border-radius: 50%; background: #222; border: 4px solid var(--primary);
      display: flex; justify-content: center; align-items: center; color: white; font-weight: bold;
    }
    .dial-hole {
      position: absolute; width: 36px; height: 36px; border-radius: 50%;
      background: rgba(255,255,255,0.2); border: 2px solid white;
      display: flex; justify-content: center; align-items: center;
      color: white; font-weight: bold; font-size: 14px; cursor: pointer;
    }
    .dial-stop {
      position: absolute; bottom: 32px; right: 48px; width: 12px; height: 24px;
      background: #888; border-radius: 4px; z-index: 5;
    }

    /* Call Screen Overlays */
    #call-overlay {
      position: absolute; top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(43, 45, 66, 0.95); z-index: 100; color: white;
      display: none; flex-direction: column; justify-content: space-between; padding: 60px 30px; text-align: center;
    }
    .avatar-large { width: 120px; height: 120px; border-radius: 50%; border: 4px solid var(--primary); margin: 0 auto 20px; object-fit: cover; }
    
    /* Photo Storage / Scrapbook styling */
    .scrapbook-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 15px; }
    .polaroid {
      background: white; padding: 10px 10px 25px 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.15);
      transform: rotate(-3deg); border: 1px solid #ddd; text-align: center;
    }
    .polaroid:nth-child(even) { transform: rotate(3deg); }
    .polaroid img { width: 100%; height: 130px; object-fit: cover; background: #eee; margin-bottom: 8px; }
    .polaroid p { font-family: 'Courier New', Courier, monospace; font-size: 12px; color: #444; font-weight: bold; }
  </style>
</head>
<body>

<div id="app">
  <div class="blob blob-1"></div>
  <div class="blob blob-2"></div>
  <div id="screen"></div>
  <div id="nav"></div>
  <div id="call-overlay"></div>
</div>

<script>
  // ตัวช่วยสร้าง DOM Element เปล่า (Pure JS ES5 Style)
  function mk(t, a, c) {
    var el = document.createElement(t);
    if (a) { for (var k in a) { el.setAttribute(k, a[k]); } }
    if (c) {
      if (!Array.isArray(c)) c = [c];
      c.forEach(function(ch) {
        if (typeof ch === 'string') el.appendChild(document.createTextNode(ch));
        else if (ch) el.appendChild(ch);
      });
    }
    return el;
  }
  function div(a, c) { return mk('div', a, c); }
  function btn(a, c) { return mk('button', a, c); }

  // ---------------- SENSITIVE DATA RESTRICTION & STATE MANAGEMENT ----------------
  // โหลดข้อมูลเริ่มต้น และใช้ข้อมูลสมมติเพื่อความเป็นส่วนตัวของผู้ใช้งาน (ตามนโยบายความเป็นส่วนตัว)
  var defaultState = {
    tab: 'prompts',
    me: { name: "คุณ (Me)", code: "44", meet: "https://meet.google.com/abc-defg-hij", photo: "" },
    friends: [
      { id: 1, name: "แอน (Ann)", code: "11", meet: "https://meet.google.com/aaa-bbbb-ccc", photo: "https://images.unsplash.com/photo-1534528741775-53994a69daeb?w=150" },
      { id: 2, name: "บ๊อบ (Bob)", code: "22", meet: "https://meet.google.com/ddd-eeee-fff", photo: "https://images.unsplash.com/photo-1507003211169-0a1dd7228f2d?w=150" },
      { id: 3, name: "เคท (Kate)", code: "33", meet: "https://meet.google.com/ggg-hhhh-iii", photo: "https://images.unsplash.com/photo-1494790108377-be9c29b29330?w=150" }
    ],
    promptIndex: 0,
    answers: {},
    scrapbook: [] // ชิ้นส่วนเก็บรูปความทรงจำโพลารอยด์
  };

  var S = JSON.parse(localStorage.getItem('ringme_state')) || defaultState;

  // ข้อ 1: ฟังก์ชันเซฟข้อมูลถาวร (Local Storage) ป้องกันข้อมูลหายตอน Refresh หน้าเว็บ
  function saveData() {
    localStorage.setItem('ringme_state', JSON.stringify(S));
  }

  var promptsData = [
    { q: "เพลงไหนที่คุณฟังซ้ำบ่อยที่สุดในสัปดาห์นี้?", a1: "เจ็บจนพอ - แอน", a2: "สายตาหลอกกันไม่ได้ - บ๊อบ", a3: "โต๊ะริม - เคท" },
    { q: "เมนูเครื่องดื่มคลายร้อนที่คุณสั่งบ่อยที่สุดคืออะไร?", a1: "ชาไทยเย็นหวานน้อย - แอน", a2: "อเมริกาโน่น้ำส้ม - บ๊อบ", a3: "มัทฉะลาเต้ - เคท" }
  ];

  var dialCodeBuffer = "";

  function goTab(t) {
    S.tab = t;
    saveData();
    renderNav();
    renderScreen();
  }

  // ---------------- UI RENDERING ----------------

  function renderNav() {
    var nav = document.getElementById('nav');
    nav.innerHTML = '';
    var items = [
      { id: 'prompts', icon: '📝', label: 'คำถาม' },
      { id: 'dial', icon: '☎️', label: 'หมุนสาย' },
      { id: 'scrapbook', icon: '📸', label: 'บันทึก' },
      { id: 'setup', icon: '⚙️', label: 'ตั้งค่า' }
    ];
    items.forEach(function(i) {
      var itemEl = div({ class: 'nav-item' + (S.tab === i.id ? ' active' : '') }, [
        mk('span', {}, i.icon),
        div({}, i.label)
      ]);
      itemEl.onclick = function() { goTab(i.id); };
      nav.appendChild(itemEl);
    });
  }

  function renderScreen() {
    var scr = document.getElementById('screen');
    scr.innerHTML = '';

    if (S.tab === 'prompts') {
      renderPromptsTab(scr);
    } else if (S.tab === 'dial') {
      renderDialTab(scr);
    } else if (S.tab === 'scrapbook') {
      renderScrapbookTab(scr);
    } else if (S.tab === 'setup') {
      renderSetupTab(scr);
    }
  }

  function renderPromptsTab(scr) {
    var p = promptsData[S.promptIndex] || promptsData[0];
    
    var card = div({ class: 'card' }, [
      div({ style: 'font-size: 14px; font-weight: bold; color: var(--primary); margin-bottom: 8px;' }, 'คำถามประจำสัปดาห์ ✨'),
      div({ style: 'font-size: 18px; font-weight: bold; line-height: 1.4;' }, p.q)
    ]);

    var ansList = div({ style: 'margin-top: 15px;' });
    var choices = [ {f: S.friends[0], txt: p.a1}, {f: S.friends[1], txt: p.a2}, {f: S.friends[2], txt: p.a3} ];
    
    choices.forEach(function(c) {
      var row = div({ 
        style: 'background: white; border: 2px solid var(--border-color); border-radius: 16px; padding: 12px; margin-bottom: 10px; display: flex; align-items: center; cursor: pointer; box-shadow: 0 4px 0 var(--border-color);' 
      }, [
        c.f.photo ? mk('img', { src: c.f.photo, style: 'width: 32px; height: 32px; border-radius: 50%; margin-right: 12px; object-fit: cover;' }) : div({ style: 'font-size: 24px; margin-right: 12px;' }, '👤'),
        div({ style: 'flex: 1;' }, [
          div({ style: 'font-size: 11px; color: var(--text-muted);' }, c.f.name),
          div({ style: 'font-size: 14px; font-weight: 500;' }, c.txt)
        ])
      ]);
      
      row.onclick = function() {
        alert("คุณทายคำตอบของ " + c.f.name + " แล้ว! ลองไปที่หน้า 'หมุนสาย' แล้วใส่รหัสของเพื่อนเพื่อโทรหาดูนะ!");
        // ข้อ 4: ระบบปลดล็อกรูปโพลารอยด์เข้าสู่ความทรงจำ
        var photoUrl = c.f.photo || "https://images.unsplash.com/photo-1516450360452-9312f5e86fc7?w=300";
        var isExist = S.scrapbook.some(function(item) { return item.ans === c.txt; });
        if(!isExist) {
          S.scrapbook.push({ name: c.f.name, ans: c.txt, photo: photoUrl });
          saveData();
        }
      };
      ansList.appendChild(row);
    });

    scr.appendChild(card);
    scr.appendChild(ansList);
  }

  // ข้อ 3: ปรับปรุงแอนิเมชันตอนเหวี่ยงวงล้อกลับ (Spin Back Animation) ให้สมจริง
  function renderDialTab(scr) {
    dialCodeBuffer = "";
    
    var infoCard = div({ class: 'card', style: 'text-align: center;' }, [
      div({ style: 'font-size: 12px; text-transform: uppercase; letter-spacing: 1px; color: var(--text-muted);' }, 'ป้อนรหัสเพื่อติดต่อ'),
      div({ id: 'dial-display', style: 'font-size: 36px; font-weight: bold; color: var(--primary); margin: 10px 0; letter-spacing: 4px; min-height: 44px;' }, '_ _')
    ]);
    
    scr.appendChild(infoCard);
    
    var dialWheel = div({ class: 'dial-wheel' });
    var centerHole = div({ class: 'dial-center-hole' }, 'RING');
    dialWheel.appendChild(centerHole);
    dialWheel.appendChild(div({ class: 'dial-stop' }));
    
    var radius = 76;
    var holesData = [
      { n: '1', a: 30 }, { n: '2', a: 60 }, { n: '3', a: 90 },
      { n: '4', a: 120 }, { n: '5', a: 150 }, { n: '6', a: 180 },
      { n: '7', a: 210 }, { n: '8', a: 240 }, { n: '9', a: 270 },
      { n: '0', a: 300 }
    ];
    
    holesData.forEach(function(h) {
      var rad = (h.a - 90) * Math.PI / 180;
      var x = 110 + radius * Math.cos(rad) - 18;
      var y = 110 + radius * Math.sin(rad) - 18;
      
      var hole = div({
        class: 'dial-hole',
        style: 'left:' + x + 'px; top:' + y + 'px;',
        'data-num': h.n
      }, h.n);
      
      // เมื่อจิ้มหมายเลข จะจำลองการหมุนกลับแบบเบาๆ นุ่มนวล (Cubic-Bezier Style)
      hole.onclick = function() {
        dialWheel.style.transition = "transform 0.4s cubic-bezier(0.25, 1, 0.5, 1)";
        dialWheel.style.transform = "rotate(" + (360 - h.a) + "deg)";
        
        setTimeout(function() {
          dialWheel.style.transition = "transform 0.5s cubic-bezier(0.25, 1, 0.5, 1)";
          dialWheel.style.transform = "rotate(0deg)";
          
          dialCodeBuffer += h.n;
          document.getElementById('dial-display').innerText = dialCodeBuffer;
          
          if(dialCodeBuffer.length >= 2) {
            checkCallCode(dialCodeBuffer);
          }
        }, 400);
      };
      
      dialWheel.appendChild(hole);
    });
    
    var container = div({ class: 'dial-container' }, dialWheel);
    scr.appendChild(container);

    // รายชื่อเพื่อนและรหัสแนะแนวสั้นๆ ด้านล่าง
    var tip = div({ style: 'text-align:center; font-size:12px; color: var(--text-muted); margin-top:10px;' }, 'รหัสติดต่อด่วน: แอน (11), บ๊อบ (22), เคท (33)');
    scr.appendChild(tip);
  }

  function renderScrapbookTab(scr) {
    scr.appendChild(div({ style: 'font-size: 20px; font-weight: bold; margin-bottom: 10px;' }, '📸 บันทึกความทรงจำ'));
    
    if(S.scrapbook.length === 0) {
      scr.appendChild(div({ class: 'card', style: 'text-align:center; color: var(--text-muted);' }, 'ยังไม่มีรูปภาพบันทึก ทายคำตอบในแถบแรกเพื่อปลดล็อกโพราลอยด์กัน!'));
      return;
    }

    var grid = div({ class: 'scrapbook-grid' });
    S.scrapbook.forEach(function(item) {
      var polaroid = div({ class: 'polaroid' }, [
        mk('img', { src: item.photo }),
        mk('p', {}, item.name),
        div({ style: 'font-size: 10px; color:#777; margin-top:2px;' }, item.ans)
      ]);
      grid.appendChild(polaroid);
    });
    scr.appendChild(grid);
  }

  function renderSetupTab(scr) {
    scr.appendChild(div({ style: 'font-size: 20px; font-weight: bold; margin-bottom: 15px;' }, '⚙️ ตั้งค่าห้องสนทนา'));
    
    var card = div({ class: 'card' }, [
      div({ style: 'font-weight: bold; margin-bottom: 5px; font-size:14px;' }, 'ลิงก์ Google Meet ประจำตัวของคุณ:'),
      mk('input', { id: 'my-meet-input', type: 'text', value: S.me.meet, style: 'width:100%; padding:10px; border:2px solid var(--border-color); border-radius:12px; margin-bottom:15px;' }),
      
      btn({ class: 'btn', style: 'width:100%;' }, 'บันทึกข้อมูลการตั้งค่า')
    ]);

    card.querySelector('.btn').onclick = function() {
      var val = document.getElementById('my-meet-input').value;
      if(val) {
        S.me.meet = val;
        saveData();
        alert('บันทึกการตั้งค่าลิงก์คุยสำเร็จแล้วครับ! 🎉');
      }
    };

    scr.appendChild(card);
  }

  // ---------------- CALL LOGIC & OVERLAY ----------------

  function checkCallCode(code) {
    var target = null;
    S.friends.forEach(function(f) { if (f.code === code) target = f; });
    
    if (target) {
      showCallOverlay(target);
    } else {
      alert("ไม่พบหมายเลขปลายทางที่คุณระบุ กรุณาลองใหม่อีกครั้ง");
      dialCodeBuffer = "";
      var disp = document.getElementById('dial-display');
      if (disp) disp.innerText = '_ _';
    }
  }

  function showCallOverlay(friend) {
    var overlay = document.getElementById('call-overlay');
    overlay.innerHTML = '';
    overlay.style.display = 'flex';
    
    var topPart = div({}, [
      div({ style: 'font-size: 14px; text-transform: uppercase; letter-spacing: 2px; color: var(--primary); margin-bottom: 10px;' }, 'กำลังต่อสายภายในระบบ...'),
      friend.photo ? mk('img', { src: friend.photo, class: 'avatar-large' }) : div({ style: 'font-size: 64px; margin-bottom: 20px;' }, '👤'),
      div({ style: 'font-size: 24px; font-weight: bold;' }, friend.name),
      div({ style: 'font-size: 14px; color: var(--text-muted); margin-top: 5px;' }, 'Connected via RingMe Server')
    ]);
    
    // ข้อ 3: การดึงห้อง Meet มาเปิดแบบ Dynamic Link
    var meetBtn = btn({ class: 'btn', style: 'background:#28a745; box-shadow: 0 4px 0 #1e7e34; width:100%; padding:14px; margin-bottom:15px; font-size:16px;' }, '🟢 เปิดคุยสาย (Google Meet)');
    meetBtn.onclick = function() {
      window.open(friend.meet, '_blank');
    };

    var hangupBtn = btn({ class: 'btn', style: 'background:#dc3545; box-shadow: 0 4px 0 #bd2130; width:100%; padding:14px; font-size:16px;' }, '🔴 วางสายโทรศัพท์');
    hangupBtn.onclick = function() {
      overlay.style.display = 'none';
      dialCodeBuffer = "";
      var disp = document.getElementById('dial-display');
      if (disp) disp.innerText = '_ _';
    };

    var btmPart = div({}, [meetBtn, hangupBtn]);
    
    overlay.appendChild(topPart);
    overlay.appendChild(btmPart);
  }

  // เริ่มต้นทำงานแอปพลิเคชันครั้งแรก
  renderNav();
  renderScreen();
</script>

</body>
</html>
