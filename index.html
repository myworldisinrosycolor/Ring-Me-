<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>RingMe! 📞</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;600;700;800&family=Caveat:wght@600;700&family=Fredoka+One&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:#FDF6F0;font-family:'Baloo 2',cursive;overflow-x:hidden}
button{font-family:'Baloo 2',cursive;cursor:pointer;border:none;outline:none;background:none;padding:0}
input,textarea{font-family:'Caveat',cursive;outline:none;border:none;background:transparent;resize:none;-webkit-appearance:none;width:100%}
a{text-decoration:none;color:inherit}
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:#F0E4DA;border-radius:3px}

/* ── LAYOUT ── */
#shell{display:flex;flex-direction:column;min-height:100vh}
#topbar{position:sticky;top:0;z-index:30;background:rgba(253,246,240,.97);backdrop-filter:blur(16px);border-bottom:1.5px solid #F0E4DA;display:flex;align-items:center;gap:0;padding:0 32px}
#topbar .logo{font-family:'Fredoka One',cursive;font-size:22px;color:#EC4899;padding:14px 0;margin-right:32px;white-space:nowrap;letter-spacing:.5px}
#topbar .logo span{font-size:13px;color:#9CA3AF;font-family:'Baloo 2',cursive;font-weight:600;margin-left:6px}
#topnav{display:flex;gap:4px;flex:1}
.ntab{display:flex;align-items:center;gap:8px;padding:10px 20px;border-radius:12px;font-size:14px;font-weight:700;color:#9CA3AF;cursor:pointer;border:none;background:none;transition:all .15s;position:relative;white-space:nowrap}
.ntab:hover{color:#3B1F0F;background:#F9F5F2}
.ntab.on{color:#EC4899;background:#FFF0F6}
.ntab .nicon{font-size:18px}
.nbadge{background:#EC4899;color:#fff;border-radius:50%;width:18px;height:18px;font-size:10px;font-weight:800;display:flex;align-items:center;justify-content:center;position:absolute;top:6px;right:10px}
#main{flex:1;padding:32px;max-width:1400px;width:100%;margin:0 auto}

/* ── CARDS & PANELS ── */
.card{background:#fff;border-radius:20px;border:1.5px solid #F0E4DA;padding:22px 24px}
.panel-grid{display:grid;gap:22px}
.pg-2{grid-template-columns:repeat(2,1fr)}
.pg-3{grid-template-columns:repeat(3,1fr)}
.pg-4{grid-template-columns:repeat(4,1fr)}
.pg-1-2{grid-template-columns:1fr 2fr}
.pg-2-1{grid-template-columns:2fr 1fr}
.pg-3-2{grid-template-columns:3fr 2fr}
@media(max-width:900px){.pg-2,.pg-3,.pg-4,.pg-1-2,.pg-2-1,.pg-3-2{grid-template-columns:1fr}}

/* ── TYPOGRAPHY ── */
.ey{font-size:11px;letter-spacing:3px;color:#C084FC;font-weight:700;text-transform:uppercase;margin-bottom:4px}
.pt{font-size:28px;font-weight:800;color:#2D1810;line-height:1.2}
.sl{font-size:11px;letter-spacing:2px;color:#9CA3AF;font-weight:700;text-transform:uppercase;margin-bottom:10px}
.sec-title{font-size:18px;font-weight:800;color:#2D1810;margin-bottom:16px}

/* ── BUTTONS ── */
.btn-pink{background:linear-gradient(135deg,#F9A8D4,#FBCFE8);border:2px solid #EC4899;border-radius:32px;padding:13px 28px;font-size:15px;font-weight:800;color:#9D174D;box-shadow:0 4px 0 #F472B6;display:inline-flex;align-items:center;justify-content:center;gap:8px;transition:all .12s;cursor:pointer}
.btn-pink:hover{transform:translateY(-2px);box-shadow:0 6px 0 #F472B6}
.btn-pink:active{transform:translateY(2px);box-shadow:0 2px 0 #F472B6}
.btn-outline{background:#fff;border:2px solid #F9A8D4;border-radius:32px;padding:11px 24px;font-size:14px;font-weight:800;color:#EC4899;transition:all .12s;cursor:pointer;display:inline-flex;align-items:center;gap:8px}
.btn-outline:hover{background:#FFF0F6}
.btn-danger{background:#fff;border:2px solid #FCA5A5;border-radius:32px;padding:11px 24px;font-size:14px;font-weight:800;color:#DC2626;transition:all .12s;cursor:pointer;display:inline-flex;align-items:center;gap:8px}
.btn-danger:hover{background:#FFF1F2}
.tab-btn{flex:1;padding:9px 8px;border-radius:20px;font-size:13px;font-weight:500;color:#9CA3AF;border:2px solid #F0E4DA;background:#fff;transition:all .15s;cursor:pointer}
.tab-btn.on{font-weight:800;border-color:#F9A8D4;background:#FFF0F6;color:#EC4899}

/* ── OVERLAYS ── */
.mbg{position:fixed;inset:0;z-index:50;background:rgba(45,24,16,.5);display:flex;flex-direction:column;justify-content:flex-end;align-items:center}
.msh{background:#FDF6F0;border-radius:24px 24px 0 0;width:100%;max-width:600px;max-height:90vh;overflow-y:auto;padding:28px 28px 48px}
.ovl{position:fixed;inset:0;z-index:100;overflow-y:auto;background:rgba(253,240,236,.97);backdrop-filter:blur(16px)}

/* ── DIAL ── */
.dial-wrap{position:relative;width:260px;height:260px;flex-shrink:0}
.dial-body{position:absolute;inset:0;border-radius:50%;background:linear-gradient(145deg,#FFB6C1,#FF69B4);box-shadow:0 8px 32px rgba(255,105,180,.45),inset 0 2px 8px rgba(255,255,255,.5)}
.dial-disc{position:absolute;top:14px;left:14px;right:14px;bottom:14px;border-radius:50%;background:linear-gradient(145deg,#FFC0CB,#FFB6C1);box-shadow:inset 0 4px 16px rgba(0,0,0,.15)}
.dial-hole{position:absolute;width:40px;height:40px;border-radius:50%;background:rgba(255,255,255,.85);box-shadow:inset 0 2px 6px rgba(0,0,0,.2);display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:700;color:#C85A6E;cursor:pointer;user-select:none;transition:box-shadow .1s}
.dial-hole:hover{box-shadow:inset 0 2px 6px rgba(0,0,0,.3),0 0 0 4px rgba(255,105,180,.3)}
.dial-ctr{position:absolute;top:35%;left:35%;right:35%;bottom:35%;border-radius:50%;background:#fff;display:flex;flex-direction:column;align-items:center;justify-content:center;box-shadow:0 2px 8px rgba(0,0,0,.15);pointer-events:none}
.dial-stop{position:absolute;right:7px;top:50%;transform:translateY(-50%);width:16px;height:28px;background:#FF69B4;border-radius:4px 4px 12px 12px}

/* ── BOARD (corkboard) ── */
.cb{background:#C8956C;border-radius:16px;padding:22px 16px 28px;box-shadow:inset 0 2px 12px rgba(0,0,0,.2);border:6px solid #A0714A}
.pin-card{background:#fff;border-radius:4px;padding:22px 16px 16px;box-shadow:0 4px 12px rgba(0,0,0,.1);position:relative}
.tape{position:absolute;width:48px;height:18px;border-radius:3px;background:rgba(255,240,200,.75);border:1px solid rgba(200,180,120,.3)}

/* ── SETUP WIZARD ── */
#setup-screen{position:fixed;inset:0;z-index:200;background:#FDF6F0;display:flex;align-items:center;justify-content:center;overflow-y:auto;padding:32px}
.wizard-card{background:#fff;border-radius:28px;border:2px solid #F0E4DA;padding:44px 48px;max-width:580px;width:100%;box-shadow:0 20px 60px rgba(200,120,100,.12);animation:slideUp .4s ease}
.wizard-step{display:none}
.wizard-step.active{display:block}
.step-dots{display:flex;gap:8px;justify-content:center;margin-bottom:28px}
.step-dot{width:10px;height:10px;border-radius:50%;background:#F0E4DA;transition:all .3s}
.step-dot.on{background:#EC4899;width:28px;border-radius:5px}
.w-inp{width:100%;font-size:22px;font-family:'Caveat',cursive;font-weight:700;color:#2D1810;border-bottom:2.5px solid #F9A8D4;padding:8px 4px;background:transparent;margin-top:14px;margin-bottom:8px}
.w-inp:focus{border-bottom-color:#EC4899}
.w-hint{font-size:12px;color:#9CA3AF;margin-top:4px}

/* ── ANIMATIONS ── */
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes slideUp{from{transform:translateY(30px);opacity:0}to{transform:none;opacity:1}}
@keyframes cardIn{from{transform:translateY(100%)}to{transform:none}}
@keyframes petalPop{0%{transform:scale(0);opacity:0}70%{transform:scale(1.15)}100%{transform:scale(1);opacity:1}}
@keyframes floatUp{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
@keyframes wiggle{0%,100%{transform:rotate(-5deg)}50%{transform:rotate(5deg)}}
@keyframes ringBounce{0%,100%{transform:rotate(-12deg)}50%{transform:rotate(12deg)}}
@keyframes pulseMeet{0%,100%{box-shadow:0 8px 0 #1558B0}50%{box-shadow:0 8px 0 #1558B0,0 0 0 18px rgba(26,115,232,0)}}
@keyframes badgePop{0%{transform:scale(.4);opacity:0}70%{transform:scale(1.1)}100%{transform:scale(1);opacity:1}}
@keyframes seedWig{0%,100%{transform:rotate(-7deg)}50%{transform:rotate(7deg)}}
</style>
</head>
<body>
<div id="setup-screen"></div>
<div id="shell" style="display:none">
  <header id="topbar">
    <div class="logo">📞 RingMe! <span>long-distance cockpit</span></div>
    <nav id="topnav"></nav>
    <div id="clock-badge" style="margin-left:auto;background:#3B1F0F;color:#FDF6F0;border-radius:20px;padding:6px 16px;font-size:14px;font-weight:700;white-space:nowrap"></div>
  </header>
  <main id="main"></main>
</div>

<script>
// ════════════════════════════════════════════════════════════
//  STORAGE KEY
// ════════════════════════════════════════════════════════════
var LS_KEY = 'ringme_profile_v1';

function loadProfile(){
  try{ var d=localStorage.getItem(LS_KEY); return d?JSON.parse(d):null; }catch(e){return null;}
}
function saveProfile(p){
  try{ localStorage.setItem(LS_KEY,JSON.stringify(p)); }catch(e){}
}
function clearProfile(){
  try{ localStorage.removeItem(LS_KEY); }catch(e){}
}

// ════════════════════════════════════════════════════════════
//  APP STATE
// ════════════════════════════════════════════════════════════
var S = {
  tab:'time',
  me:{name:'You',emoji:'🌺',city:'My City',birthday:'Jun 15',bio:'Long-distance friendship curator 🌸',flower:'daisy',color:'#A5B4FC'},
  friends:[
    {id:1,name:'Mia',  emoji:'🌸',city:'London',   tz:'Europe/London',    color:'#F9A8D4',soft:'#FFF0F6',flower:'rose',    bday:'Mar 14'},
    {id:2,name:'Yuki', emoji:'🌷',city:'Tokyo',    tz:'Asia/Tokyo',       color:'#86EFAC',soft:'#F0FDF4',flower:'cherry',  bday:'Jul 22'},
    {id:3,name:'Sofia',emoji:'🌻',city:'São Paulo',tz:'America/Sao_Paulo',color:'#FCD34D',soft:'#FFFBEB',flower:'sunflower',bday:'Nov 3'}
  ],
  meetLink:'https://meet.google.com/new',
  sendCount:1,
  inbox:[
    {id:1,fid:1,flower:'daisy',   note:'Thinking of you! 🌼',time:'2h ago', read:false},
    {id:2,fid:2,flower:'lavender',note:'Miss you so much 💜',  time:'1d ago', read:true},
    {id:3,fid:3,flower:'hibiscus',note:"You're amazing! 🌺",   time:'3d ago', read:true}
  ],
  garden:[
    {id:1,flower:'daisy',   from:'Mia', date:'Feb 28'},
    {id:2,flower:'lavender',from:'Yuki',date:'Feb 27'}
  ],
  slots:{},
  badges:{campfire:false,'og-friends':true,'weekly-duo':true,'memory-keeper':false,comedian:false},
  pins:[
    {id:1,auth:'Mia',  ae:'🌸',cat:'crush',  col:'#F9A8D4',bg:'#FFF0F6',txt:"There's this person at my coffee shop who remembered my order! I am normal about this.",time:'2d ago',likes:2,liked:false,rot:-3,tape:'left'},
    {id:2,auth:'Yuki', ae:'🌷',cat:'project',col:'#86EFAC',bg:'#F0FDF4',txt:'Learning pottery!! My first bowl looks like a sad taco but I am obsessed 🏺',            time:'3d ago',likes:3,liked:true, rot:2, tape:'right'},
    {id:3,auth:'Sofia',ae:'🌻',cat:'thought',col:'#FCA5A5',bg:'#FFF1F2',txt:"Why do airports have moving walkways but regular sidewalks don't?? Wild.",               time:'4d ago',likes:1,liked:false,rot:-2,tape:'center'},
    {id:4,auth:'Mia',  ae:'🌸',cat:'life',   col:'#A5B4FC',bg:'#EEF2FF',txt:"Finally finished the book I've been reading since JANUARY. I cried. Not sad crying.",    time:'5d ago',likes:2,liked:false,rot:3, tape:'left'},
    {id:5,auth:'Yuki', ae:'🌷',cat:'moment', col:'#FCD34D',bg:'#FFFBEB',txt:'The cherry blossoms are absolutely insane right now in Tokyo 🌸',                        time:'6d ago',likes:4,liked:true, rot:-1,tape:'right'}
  ],
  pAnswered:{w2:'Laughing until we cried'},
  pDone:['w2'],
  ftab:'send',fSendFriend:0,fSendFlower:'',fNote:'',fSent:false,
  callActive:false,callCode:'',callFriends:[],callSuccess:false,callDialed:[],
  seedModal:null,
  boardFilter:'all',boardPost:false,postCat:'',postTxt:'',
  ptab:'weekly',pMode:'list',pActive:null,pWrite:'',pPolaroid:null,
  stab:'me',sEditFriend:0,emojiPickFor:''
};

var MY_TZ=(function(){try{return Intl.DateTimeFormat().resolvedOptions().timeZone;}catch(e){return'UTC';}})();

// ════════════════════════════════════════════════════════════
//  SETUP WIZARD
// ════════════════════════════════════════════════════════════
var WIZARD = {step:1, name:'', city:'', tz:MY_TZ, emoji:'🌺', flower:'daisy', color:'#A5B4FC'};
var WIZARD_STEPS = 6;

function startApp(){
  qs('setup-screen').style.display='none';
  qs('shell').style.display='flex';
  render();
  setInterval(tickClock,1000);
  tickClock();
}

function applyProfile(p){
  S.me.name    = p.name   || S.me.name;
  S.me.city    = p.city   || S.me.city;
  S.me.emoji   = p.emoji  || S.me.emoji;
  S.me.flower  = p.flower || S.me.flower;
  S.me.color   = p.color  || S.me.color;
}

function launchSetup(){
  qs('shell').style.display='none';
  qs('setup-screen').style.display='flex';
  WIZARD={step:1,name:'',city:'',tz:MY_TZ,emoji:'🌺',flower:'daisy',color:'#A5B4FC'};
  renderWizard();
}

function init(){
  var saved=loadProfile();
  if(saved&&saved.name){
    applyProfile(saved);
    startApp();
  } else {
    launchSetup();
  }
}

// ── Wizard renderer ──────────────────────────────────────────
var EMOJIS=['🌺','🌸','🌼','🌻','🌷','💐','🌹','🪷','🍀','🌿','🍃','🌱','🦋','🐝','🌙','⭐','🌈','✨','💫','🎀','🎠','🍓','🍑','🫧'];
var THEMES=[{name:'Lavender',v:'#A5B4FC'},{name:'Rose',v:'#F9A8D4'},{name:'Sage',v:'#86EFAC'},{name:'Butter',v:'#FCD34D'},{name:'Peach',v:'#FCA5A5'},{name:'Sky',v:'#7DD3FC'},{name:'Lilac',v:'#C4B5FD'},{name:'Mint',v:'#6EE7B7'}];
var FLOWERS=[{id:'rose',name:'Rose',col:'#F9A8D4'},{id:'daisy',name:'Daisy',col:'#FDE68A'},{id:'tulip',name:'Tulip',col:'#FCA5A5'},{id:'lavender',name:'Lavender',col:'#C4B5FD'},{id:'sunflower',name:'Sunflower',col:'#FCD34D'},{id:'cherry',name:'Cherry Blossom',col:'#FBCFE8'},{id:'hibiscus',name:'Hibiscus',col:'#FB7185'},{id:'aster',name:'Aster',col:'#A78BFA'}];

function renderWizard(){
  var ss=qs('setup-screen');
  ss.innerHTML='';
  var wc=div({cls:'wizard-card'});

  // Dots
  var dots=div({cls:'step-dots'});
  for(var i=1;i<=WIZARD_STEPS;i++) dots.appendChild(div({cls:'step-dot'+(WIZARD.step===i?' on':'')}));
  wc.appendChild(dots);

  var titles=["Let's meet you! 🌸","Where are you based? 📍","Pick your avatar ✨","Choose your theme colour 🎨","Your favourite flower 🌸","All set — let's go! 🚀"];
  var subs=["What should your friends call you?","Your city helps us calculate time zones!","Tap your favourite emoji to use as your avatar.","This colour will highlight your profile across the app.","This is the flower your friends will send you most!","Your cosy long-distance cockpit is ready."];

  wc.appendChild(div({css:{fontSize:'11px',letterSpacing:'3px',color:'#C084FC',fontWeight:'700',textTransform:'uppercase',marginBottom:'8px'},txt:'Step '+WIZARD.step+' of '+WIZARD_STEPS}));
  wc.appendChild(div({css:{fontSize:'26px',fontWeight:'800',color:'#2D1810',marginBottom:'8px'},txt:titles[WIZARD.step-1]}));
  wc.appendChild(div({css:{fontSize:'14px',color:'#9CA3AF',marginBottom:'28px'},txt:subs[WIZARD.step-1]}));

  if(WIZARD.step===1){
    var ni=mk('input',{type:'text',cls:'w-inp',placeholder:'e.g. Jasmine',maxlength:'24',value:WIZARD.name||'',input:function(e){WIZARD.name=e.target.value;}});
    wc.appendChild(ni);
    wc.appendChild(div({cls:'w-hint',txt:'Use whatever name feels right — a nickname works great!'}));
    setTimeout(function(){var el=wc.querySelector('.w-inp');if(el)el.focus();},50);
  }
  if(WIZARD.step===2){
    var ci=mk('input',{type:'text',cls:'w-inp',placeholder:'e.g. Bangkok, Thailand',maxlength:'32',value:WIZARD.city||'',input:function(e){WIZARD.city=e.target.value;}});
    wc.appendChild(ci);
    var tzi=mk('input',{type:'text',cls:'w-inp',placeholder:'e.g. Asia/Bangkok',maxlength:'48',value:WIZARD.tz||MY_TZ,input:function(e){WIZARD.tz=e.target.value;}});
    wc.appendChild(div({css:{marginTop:'18px',fontSize:'13px',fontWeight:'700',color:'#9CA3AF'},txt:'Your timezone (IANA format):'}));
    wc.appendChild(tzi);
    wc.appendChild(div({cls:'w-hint',txt:'Your detected timezone: '+MY_TZ}));
  }
  if(WIZARD.step===3){
    var eg=div({css:{display:'flex',flexWrap:'wrap',gap:'10px',marginBottom:'16px'}});
    for(var i=0;i<EMOJIS.length;i++){
      (function(e){
        var b=btn({css:{width:'52px',height:'52px',borderRadius:'14px',background:WIZARD.emoji===e?'#FFF0F6':'#fff',border:'2px solid '+(WIZARD.emoji===e?'#EC4899':'#F0E4DA'),fontSize:'26px',display:'flex',alignItems:'center',justifyContent:'center',transition:'all .12s'},txt:e,click:function(){WIZARD.emoji=e;renderWizard();}});
        eg.appendChild(b);
      })(EMOJIS[i]);
    }
    wc.appendChild(eg);
    wc.appendChild(div({css:{textAlign:'center',fontSize:'40px'},txt:'Selected: '+WIZARD.emoji}));
  }
  if(WIZARD.step===4){
    var cg=div({css:{display:'flex',flexWrap:'wrap',gap:'14px',marginBottom:'16px'}});
    for(var i=0;i<THEMES.length;i++){
      (function(c){
        var b=btn({css:{display:'flex',flexDirection:'column',alignItems:'center',gap:'6px'},click:function(){WIZARD.color=c.v;renderWizard();}});
        b.appendChild(div({css:{width:'60px',height:'60px',borderRadius:'50%',background:'linear-gradient(135deg,'+c.v+'dd,'+c.v+'88)',border:'4px solid '+(WIZARD.color===c.v?c.v:'transparent'),boxShadow:WIZARD.color===c.v?'0 0 0 4px #fff,0 0 0 7px '+c.v:'0 2px 8px '+c.v+'44'}}));
        b.appendChild(div({css:{fontSize:'11px',fontWeight:'700',color:WIZARD.color===c.v?c.v:'#9CA3AF'},txt:c.name}));
        cg.appendChild(b);
      })(THEMES[i]);
    }
    wc.appendChild(cg);
  }
  if(WIZARD.step===5){
    var fg=div({css:{display:'flex',flexWrap:'wrap',gap:'12px',marginBottom:'8px'}});
    for(var i=0;i<FLOWERS.length;i++){
      (function(fl){
        var b=btn({css:{width:'calc(25% - 9px)',padding:'12px 8px 14px',borderRadius:'18px',border:'2px solid '+(WIZARD.flower===fl.id?fl.col:'#F0E4DA'),background:WIZARD.flower===fl.id?fl.col+'22':'#fff',textAlign:'center',transition:'all .12s'},click:function(){WIZARD.flower=fl.id;renderWizard();}});
        b.appendChild(div({css:{display:'flex',justifyContent:'center'}},[ flSVG(fl.id,48) ]));
        b.appendChild(div({css:{fontSize:'11px',fontWeight:'700',color:'#3B1F0F',marginTop:'4px',lineHeight:'1.2'},txt:fl.name}));
        fg.appendChild(b);
      })(FLOWERS[i]);
    }
    wc.appendChild(fg);
  }
  if(WIZARD.step===6){
    var summary=div({css:{background:'linear-gradient(135deg,#FFF0F6,#EEF2FF)',border:'2px solid '+WIZARD.color,borderRadius:'20px',padding:'24px',marginBottom:'24px',textAlign:'center'}});
    summary.appendChild(div({css:{fontSize:'52px',marginBottom:'10px'},txt:WIZARD.emoji}));
    summary.appendChild(div({css:{fontSize:'22px',fontWeight:'800',color:'#2D1810'},txt:WIZARD.name||'Friend'}));
    summary.appendChild(div({css:{fontSize:'14px',color:'#9CA3AF',marginTop:'4px'},txt:'📍 '+(WIZARD.city||'Somewhere lovely')+' · 🌐 '+(WIZARD.tz||MY_TZ)}));
    var fl=flById(WIZARD.flower);
    summary.appendChild(div({css:{marginTop:'10px',fontSize:'13px',color:'#9CA3AF'},txt:'Favourite flower: '+fl.name+'  |  Theme: '+WIZARD.color}));
    wc.appendChild(summary);
  }

  var btnRow=div({css:{display:'flex',gap:'12px',marginTop:'28px',justifyContent:'flex-end'}});
  if(WIZARD.step>1){
    btnRow.appendChild(btn({cls:'btn-outline',txt:'← Back',click:function(){WIZARD.step--;renderWizard();}}));
  }
  if(WIZARD.step<WIZARD_STEPS){
    var nextLabel=WIZARD.step===1?'Continue →':'Next →';
    btnRow.appendChild(btn({cls:'btn-pink',txt:nextLabel,click:function(){
      if(WIZARD.step===1&&!WIZARD.name.trim()){alert('Please enter your name!');return;}
      WIZARD.step++;renderWizard();
    }}));
  } else {
    btnRow.appendChild(btn({cls:'btn-pink',txt:'🚀 Launch RingMe!',click:function(){

// ── Time helpers ─────────────────────────────────────────────
function tzOff(tz){
  try{
    var n=new Date(),utc=n.toLocaleString('en-US',{timeZone:'UTC',hour:'numeric',minute:'2-digit',hour12:false}),loc=n.toLocaleString('en-US',{timeZone:tz,hour:'numeric',minute:'2-digit',hour12:false});
    function p(s){var a=s.split(':');return parseInt(a[0]||0)+parseInt(a[1]||0)/60;}
    var d=p(loc)-p(utc);if(d>14)d-=24;if(d<-12)d+=24;return d;
  }catch(e){return 0;}
}
function getOverlap(tzs){
  var offs=[];for(var i=0;i<tzs.length;i++)offs.push(tzOff(tzs[i]));
  var result=[];
  for(var h=0;h<24;h++){
    var ok=true;
    for(var j=0;j<offs.length;j++){var l=((h+offs[j])%24+24)%24;if(l<9||l>=22){ok=false;break;}}
    if(ok)result.push({utcH:h,localH:((h+offs[0])%24+24)%24});
  }
  return result;
}
function pick3(slots){
  if(!slots.length)return[];
  var f=slots[0],m=slots[Math.floor(slots.length/2)],l=slots[slots.length-1];
  var seen={},out=[];
  var items=[{slot:f,lbl:'Early'},{slot:m,lbl:'Middle'},{slot:l,lbl:'Late'}];
  for(var i=0;i<items.length;i++){if(!seen[items[i].slot.utcH]){seen[items[i].slot.utcH]=true;out.push({utcH:items[i].slot.utcH,localH:items[i].slot.localH,label:items[i].lbl});}}
  return out;
}
function toLocal(utcH,tz){return((utcH+tzOff(tz))%24+24)%24;}
function fmtH(h){var n=((h%24)+24)%24;if(n===0)return'12 AM';if(n<12)return n+' AM';if(n===12)return'12 PM';return(n-12)+' PM';}
function tzTime(tz){try{return new Date().toLocaleString('en-US',{timeZone:tz,hour:'2-digit',minute:'2-digit',hour12:true});}catch(e){return'--:--';}}
function tzHour(tz){try{var r=new Date().toLocaleString('en-US',{timeZone:tz,hour:'numeric',hour12:false});var h=parseInt(r);return h===24?0:h;}catch(e){return 12;}}
function getStatus(tz){var h=tzHour(tz);if(h>=6&&h<12)return{i:'🌅',l:'Morning',ok:true};if(h>=12&&h<17)return{i:'☀️',l:'Afternoon',ok:true};if(h>=17&&h<22)return{i:'🌇',l:'Evening',ok:true};return{i:'🌙',l:'Sleeping',ok:false};}

// ── Rotary Dial ──────────────────────────────────────────────
var DIAL_POS=[{d:'1',a:-60},{d:'2',a:-30},{d:'3',a:0},{d:'4',a:30},{d:'5',a:60},{d:'6',a:90},{d:'7',a:120},{d:'8',a:150},{d:'9',a:180},{d:'0',a:210}];
function makeDial(onDigit){
  var spinning=false;
  var wrap=div({cls:'dial-wrap'});
  wrap.innerHTML='<div class="dial-body"></div>';
  var disc=div({cls:'dial-disc'});
  var ctr=div({cls:'dial-ctr'});
  ctr.innerHTML='<div style="font-size:9px;color:#C85A6E;font-weight:700;letter-spacing:1px">RING</div><div style="font-size:12px;font-weight:800;color:#3B1F0F">ME!</div>';
  var stop=div({cls:'dial-stop'});
  for(var i=0;i<DIAL_POS.length;i++){
    (function(dp){
      var rad=((dp.a-90)*Math.PI)/180,r=33;
      var cx=50+r*Math.cos(rad),cy=50+r*Math.sin(rad);
      var hole=div({cls:'dial-hole',txt:dp.d});
      hole.style.left='calc('+cx.toFixed(2)+'% - 20px)';
      hole.style.top='calc('+cy.toFixed(2)+'% - 20px)';
      hole.addEventListener('click',function(){
        if(spinning)return;spinning=true;
        var frame=0,total=22,target=dp.a+60;
        function go(){frame++;var rot=frame<=total/2?target*(frame/(total/2)):target*(1-(frame-total/2)/(total/2));disc.style.transform='rotate('+rot+'deg)';if(frame<total)requestAnimationFrame(go);else{disc.style.transform='';spinning=false;onDigit(dp.d);}}
        requestAnimationFrame(go);
      });
      disc.appendChild(hole);
    })(DIAL_POS[i]);
  }
  disc.appendChild(ctr);
  wrap.appendChild(disc);
  wrap.appendChild(stop);
  return wrap;
}

  // ──────────────────────────────────────────────────────────

  right.appendChild(div({css:{background:'#F0FDF4',border:'1.5px solid #86EFAC',borderRadius:'18px',padding:'14px 20px',textAlign:'center'}},[div({css:{fontSize:'14px',fontWeight:'700',color:'#14532D'},txt:'✅ All changes save automatically while you edit!'})]));
  grid.appendChild(right);body.appendChild(grid);
}

function renderFriendsTab(body){
  if(S.sEditFriend){
    var f=frById(S.sEditFriend);
    body.appendChild(btn({css:{fontSize:'14px',color:'#C084FC',fontWeight:'700',padding:'0',marginBottom:'12px'},txt:'← Back to friends',click:function(){S.sEditFriend=0;render();}}));
    var grid=div({cls:'panel-grid pg-2',css:{maxWidth:'900px'}});
    var left=div({css:{display:'flex',flexDirection:'column',gap:'14px'}});

    avBtn.appendChild(div({css:{fontSize:'38px'},txt:f.emoji}));

    avCard.appendChild(avBtn);avCard.appendChild(div({css:{fontSize:'19px',fontWeight:'800',color:'#2D1810'},txt:f.name}));
    left.appendChild(avCard);
    left.appendChild(sInput('Name',f.name,"Friend's name",20,function(v){f.name=v;}));
    left.appendChild(sInput('City',f.city,'Their city',28,function(v){f.city=v;}));
    left.appendChild(sInput('Timezone (IANA)',f.tz,'e.g. Asia/Tokyo',48,function(v){f.tz=v;}));
    left.appendChild(sInput('Birthday',f.bday,'e.g. Mar 14',12,function(v){f.bday=v;}));
    grid.appendChild(left);
    var right=div({css:{display:'flex',flexDirection:'column',gap:'14px'}});
    var cCard=div({cls:'card'});cCard.appendChild(div({cls:'sl',txt:'Profile Colour'}));
    var cRow=div({css:{display:'flex',gap:'10px',flexWrap:'wrap'}});
    for(var i=0;i<THEMES.length;i++){
      (function(c){cRow.appendChild(btn({css:{width:'44px',height:'44px',borderRadius:'50%',background:c.v,border:'4px solid '+(f.color===c.v?'#2D1810':'transparent'),boxShadow:f.color===c.v?'0 0 0 2px #fff,0 0 0 5px '+c.v:'none'},click:function(){f.color=c.v;f.soft=c.v+'22';render();}}));})(THEMES[i]);
    }
    cCard.appendChild(cRow);right.appendChild(cCard);
    grid.appendChild(right);body.appendChild(grid);
  } else {
    body.appendChild(div({cls:'sl',css:{marginBottom:'14px'},txt:'Your Friends 💕'}));
    var fg=div({css:{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(280px,1fr))',gap:'14px',maxWidth:'900px',marginBottom:'24px'}});
    for(var i=0;i<S.friends.length;i++){
      (function(f){
        fg.appendChild(btn({css:{display:'flex',alignItems:'center',gap:'16px',background:'#fff',border:'1.5px solid '+f.color+'66',borderRadius:'20px',padding:'16px 18px',width:'100%',textAlign:'left',cursor:'pointer',boxShadow:'0 2px 8px rgba(0,0,0,.04)'},click:function(){S.sEditFriend=f.id;render();}},
          [div({css:{width:'56px',height:'56px',flexShrink:'0',borderRadius:'50%',background:'linear-gradient(145deg,'+f.color+'88,'+f.color+'33)',border:'3px solid '+f.color,display:'flex',alignItems:'center',justifyContent:'center',fontSize:'28px'},txt:f.emoji}),
           div({css:{flex:'1'}},[div({css:{fontSize:'16px',fontWeight:'800',color:'#2D1810'},txt:f.name}),div({css:{fontSize:'12px',color:'#9CA3AF',marginTop:'2px'},txt:'📍 '+f.city}),div({css:{fontSize:'11px',color:'#9CA3AF'},txt:'🌐 '+f.tz})]),
           div({css:{fontSize:'14px',color:'#C084FC',fontWeight:'700'},txt:'Edit →'})]
        ));
      })(S.friends[i]);
    }
    body.appendChild(fg);
    body.appendChild(div({css:{background:'linear-gradient(135deg,#EEF2FF,#FFF0F6)',border:'1.5px dashed #A5B4FC',borderRadius:'18px',padding:'20px 24px',maxWidth:'480px'}},
      [div({css:{fontSize:'14px',fontWeight:'700',color:'#6366F1',marginBottom:'4px'},txt:'💡 Tip: Use real IANA timezones for accurate overlap!'}),
       div({css:{fontSize:'12px',color:'#9CA3AF',lineHeight:'1.6'},txt:'Examples: Asia/Tokyo · Europe/London · America/New_York · America/Sao_Paulo'})]
    ));
  }
}

function renderMeetTab(body){

  card.appendChild(div({css:{fontSize:'13px',color:'#9CA3AF',marginBottom:'18px',lineHeight:'1.6'},txt:'Paste your permanent Meet link here. Go to meet.google.com → New meeting → Get a link to share.'}));
  var li=inp({css:{fontSize:'16px',color:'#2D1810',fontWeight:'600',borderBottom:'2px solid #A5B4FC',paddingBottom:'6px',width:'100%',display:'block'},placeholder:'https://meet.google.com/abc-defg-hij',value:S.meetLink||''});
  li.addEventListener('input',function(e){S.meetLink=e.target.value;});
  card.appendChild(li);
  card.appendChild(div({css:{marginTop:'10px',fontSize:'12px',color:'#22C55E',fontWeight:'600'},txt:'✅ Saved — used automatically when you dial in'}));
  left.appendChild(card);

    [span({css:{fontSize:'24px'},txt:'📹'}),span({css:{fontSize:'17px',fontWeight:'800',color:'#fff'},txt:'Test your Meet link'})]);
  left.appendChild(testBtn);grid.appendChild(left);
  var right=div();
  right.appendChild(div({css:{background:'#FFF0F6',border:'1.5px solid #F9A8D4',borderRadius:'18px',padding:'20px 24px'}},

  ));
  grid.appendChild(right);body.appendChild(grid);
}
