<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RingMe! — Long Distance Cockpit</title>
<!-- ดึงฟอนต์สุดน่ารักสไตล์ Cozy ที่ Claude เลือกใช้ -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;600;700;800&family=Fredoka+One&display=swap" rel="stylesheet">
<style>
/* ── UI Design Foundations (Claude Pastel Engine) ── */
:root {
  --bg-cozy: #FDF6F0;
  --text-dark: #2D1810;
  --primary-pink: #EC4899;
  --primary-shadow: #BE185D;
  --border-dark: #2D1810;
  --card-shadow: #F0E4DA;
}

* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; background: var(--bg-cozy); font-family: 'Baloo 2', cursive; color: var(--text-dark); overflow-x: hidden; }

/* 💻 ปรับการแสดงผลให้สวยงามบนหน้าจอคอมพิวเตอร์เป็นหลัก (Desktop First) */
#app { 
  width: 100%; 
  max-width: 1100px; /* ขยายขอบเขตให้พอดีสายตาบนหน้าจอคอม */
  min-height: 100vh; 
  margin: 0 auto;
  padding: 40px 20px 100px 20px;
  position: relative; 
  z-index: 1;
}

/* Decorative Watercolor Blobs - เอฟเฟกต์สีน้ำฟุ้งกระจายด้านหลัง */
.bg-blob { position: fixed; width: 550px; height: 550px; border-radius: 50%; filter: blur(100px); opacity: 0.18; z-index: -1; pointer-events: none; }
.blob-pink { top: -150px; left: -100px; background: radial-gradient(circle, var(--primary-pink) 0%, transparent 70%); }
.blob-green { bottom: -150px; right: -100px; background: radial-gradient(circle, #86EFAC 0%, transparent 70%); }

/* คลาสการ์ดและปุ่มกดสไตล์ Retro-Chic 3D มิติหนาแบบต้นฉบับ */
.card { 
  background: #FFFFFF; 
  border: 3px solid var(--border-dark); 
  border-radius: 28px; 
  box-shadow: 0 10px 0 var(--card-shadow); 
  padding: 30px; 
  margin-bottom: 24px; 
  position: relative; 
}

.btn-pink { 
  background: var(--primary-pink); 
  color: #FFFFFF; 
  font-weight: 800; 
  font-size: 18px; 
  border: 3px solid var(--border-dark);
  border-radius: 20px; 
  padding: 14px 32px; 
  box-shadow: 0 6px 0 var(--primary-shadow); 
  transition: all 0.1s ease; 
  display: inline-block; 
  cursor: pointer;
}
.btn-pink:active { transform: translateY(4px); box-shadow: 0 2px 0 var(--primary-shadow); }

/* การจัดเลย์เอาท์แบบ Grid กระจายสวยงามบนหน้าจอคอม */
.main-layout { display: grid; grid-template-columns: 1fr; gap: 30px; }
@media (min-width: 768px) {
  .main-layout { grid-template-columns: 1.2fr 0.8fr; } /* แบ่งฝั่งซ้าย-ขวาบนจอคอม */
  .full-width { grid-column: span 2; }
}

.app-title { font-family: 'Fredoka One', cursive; font-size: 42px; color: var(--primary-pink); text-shadow: 3px 3px 0 #FBCFE8; margin-bottom: 8px; }
.screen-title { font-size: 26px; font-weight: 800; margin-bottom: 20px; }
.cozy-input { width: 100%; border: 3px solid var(--border-dark); border-radius: 20px; padding: 14px 22px; font-size: 16px; margin-bottom: 24px; font-family: 'Baloo 2', cursive; font-weight: 600; box-shadow: 0 4px 0 var(--card-shadow); }

/* ── 6-Step Setup Wizard UI ── */
.ob-container { max-width: 580px; margin: 80px auto; text-align: center; }
.ob-progress { display: flex; justify-content: center; gap: 10px; margin-bottom: 35px; }
.ob-dot { width: 14px; height: 14px; border-radius: 50%; background: #E5E7EB; border: 2px solid var(--border-dark); }
.ob-dot.active { background: var(--primary-pink); transform: scale(1.25); }

/* ── Navigation Tab Bar ── */
.top-nav { display: flex; gap: 14px; margin-bottom: 35px; border-bottom: 3px dashed #FBCFE8; padding-bottom: 20px; }
.nav-tab { padding: 12px 24px; border-radius: 18px; font-weight: 800; font-size: 16px; border: 3px solid transparent; font-family: 'Baloo 2', cursive; cursor: pointer; color: #6B7280; }
.nav-tab.active { background: #FCD34D; color: var(--text-dark); border-color: var(--border-dark); box-shadow: 0 5px 0 var(--border-dark); }

/* ── แป้นหมุนโทรศัพท์แบบปุ่มกด Retro Layout ── */
.dial-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 18px; max-width: 280px; margin: 24px auto; }
.dial-node { background: #FFFFFF; border: 3px solid var(--border-dark); box-shadow: 0 6px 0 var(--border-dark); width: 75px; height: 75px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 24px; font-weight: 800; font-family: 'Baloo 2', cursive; cursor: pointer; }
.dial-node:active { transform: translateY(4px); box-shadow: 0 2px 0 var(--border-dark); }
.dial-node.action-btn { font-size: 18px; background: #FEE2E2; }
.dial-node.call-btn { background: #86EFAC; font-size: 20px; }

/* ── Corkboard Post-it Notes ── */
.board-container { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 20px; margin-top: 15px; }
.postit { padding: 20px; border-radius: 20px; border: 3px solid var(--border-dark); box-shadow: 5px 5px 0 var(--border-dark); min-height: 160px; display: flex; flex-direction: column; justify-content: space-between; transform: rotate(-1deg); }
.postit:nth-child(even) { transform: rotate(1.5deg); }
</style>
</head>
<body>

<div id="app">
  <div class="bg-blob blob-pink"></div>
  <div class="bg-blob blob-green"></div>
  <div id="view-layer"></div>
</div>

<script>
// ── App Engine & Reactive State Store ──
var S = {
  setupDone: false,
  step: 1,
  activeTab: 'time',
  user: { name: '', city: '', tz: 'UTC' },
  friends: [
    { name: 'Mochi', city: 'Tokyo', tz: 'Asia/Tokyo', avatar: '🧸', streak: 5, code: '11' },
    { name: 'Bento', city: 'London', tz: 'Europe/London', avatar: '🦊', streak: 2, code: '22' }
  ],
  board: [
    { from: 'Mochi', text: 'Just had an iced matcha latte! Missing our cozy chats ☕', tag: 'daily', bg: '#FFF9E6' },
    { from: 'You', text: 'Building our long-distance cockpit application right now! ✨', tag: 'status', bg: '#E6F9FF' }
  ],
  dialDigits: ''
};

// Sync State with LocalStorage Secure Engine
if(localStorage.getItem('ringme_desktop_perfect')) {
  try { S = JSON.parse(localStorage.getItem('ringme_desktop_perfect')); } catch(e){}
}
function sync() { localStorage.setItem('ringme_desktop_perfect', JSON.stringify(S)); }

// Timezone Converter Matrix
function resolveTimezone(cityName) {
  var c = cityName.toLowerCase().trim();
  if(c.includes('bangkok') || c.includes('thailand')) return 'Asia/Bangkok';
  if(c.includes('tokyo') || c.includes('japan')) return 'Asia/Tokyo';
  if(c.includes('london') || c.includes('uk')) return 'Europe/London';
  if(c.includes('seoul') || c.includes('korea')) return 'Asia/Seoul';
  if(c.includes('new york') || c.includes('us')) return 'America/New_York';
  return Intl.DateTimeFormat().resolvedOptions().timeZone;
}

function getRemoteTime(tz) {
  try {
    return new Date().toLocaleTimeString('en-US', { timeZone: tz, hour: '2-digit', minute: '2-digit', hour12: true });
  } catch(e) {
    return new Date().toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit', hour12: true });
  }
}

// ── Step-by-Step Onboarding Render Engine ──
function renderOnboarding() {
  var layer = document.getElementById('view-layer');
  layer.innerHTML = '';

  var container = document.createElement('div');
  container.className = 'ob-container';

  // 6-Step Dot Visualizer
  var progress = document.createElement('div');
  progress.className = 'ob-progress';
  for(var i=1; i<=4; i++) {
    var dot = document.createElement('div');
    dot.className = 'ob-dot' + (S.step === i ? ' active' : '');
    progress.appendChild(dot);
  }
  container.appendChild(progress);

  if(S.step === 1) {
    var c = document.createElement('div');
    c.className = 'card';
    c.innerHTML = `
      <div style="font-size: 64px; margin-bottom: 20px;">📞</div>
      <h1 class="app-title">Welcome to RingMe!</h1>
      <p style="color: #6B7280; font-size: 18px; margin-bottom: 30px; line-height:1.5;">The cozy long-distance cockpit designed for friends who are far apart — but close at heart 💕</p>
    `;
    var b = document.createElement('button');
    b.className = 'btn-pink';
    b.textContent = "Let's get started ✨";
    b.onclick = function() { S.step = 2; renderOnboarding(); };
    c.appendChild(b);
    container.appendChild(c);
  }
  else if(S.step === 2) {
    var c = document.createElement('div');
    c.className = 'card';
    c.innerHTML = `
      <h2 class="screen-title">What's your beautiful name?</h2>
      <p style="color: #6B7280; margin-bottom: 24px;">Your bestie will see this listed on their communications command deck.</p>
      <input type="text" id="ob-username" class="cozy-input" placeholder="Enter your nickname..." value="${S.user.name}">
    `;
    var b = document.createElement('button');
    b.className = 'btn-pink';
    b.textContent = 'Next profile step ➡️';
    b.onclick = function() {
      var val = document.getElementById('ob-username').value.trim();
      if(!val) { alert('Please write down your name!'); return; }
      S.user.name = val;
      S.step = 3;
      renderOnboarding();
    };
    c.appendChild(b);
    container.appendChild(c);
  }
  else if(S.step === 3) {
    var c = document.createElement('div');
    c.className = 'card';
    c.innerHTML = `
      <h2 class="screen-title">Where are you floating in the world?</h2>
      <p style="color: #6B7280; margin-bottom: 24px;">Enter your current city to calibrate real-time synchronization clocks.</p>
      <input type="text" id="ob-city" class="cozy-input" placeholder="e.g. Bangkok, Tokyo, London" value="${S.user.city}">
    `;
    var b = document.createElement('button');
    b.className = 'btn-pink';
    b.textContent = 'Calibrate Time-Grid ➡️';
    b.onclick = function() {
      var val = document.getElementById('ob-city').value.trim();
      if(!val) { alert('Please write down your city!'); return; }
      S.user.city = val;
      S.user.tz = resolveTimezone(val);
      S.step = 4;
      renderOnboarding();
    };
    c.appendChild(b);
    container.appendChild(c);
  }
  else if(S.step === 4) {
    var c = document.createElement('div');
    c.className = 'card';
    c.innerHTML = `
      <div style="font-size: 64px; margin-bottom: 20px;">🚀</div>
      <h2 class="screen-title">Account parameters locked!</h2>
      <div style="background: var(--bg-cozy); border: 2px solid var(--border-dark); padding: 15px; border-radius: 16px; margin-bottom: 24px; font-weight:600;">
        Hello <span style="color:var(--primary-pink); font-weight:800;">${S.user.name}</span> from ${S.user.city} (${S.user.tz})
      </div>
      <p style="color: #6B7280; margin-bottom: 24px;">Your long-distance communication pipeline is secure, encrypted and fully online.</p>
    `;
    var b = document.createElement('button');
    b.className = 'btn-pink';
    b.textContent = 'Launch Dashboard Control 🛰️';
    b.onclick = function() {
      S.setupDone = true;
      sync();
      renderMainDeck();
    };
    c.appendChild(b);
    container.appendChild(c);
  }

  layer.appendChild(container);
}

// ── Desktop Dashboard Cockpit View ──
function renderMainDeck() {
  sync();
  var layer = document.getElementById('view-layer');
  layer.innerHTML = '';

  // App Header Element
  var header = document.createElement('div');
  header.style.cssText = 'display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; flex-wrap: wrap; gap: 15px;';
  header.innerHTML = `
    <div>
      <div class="app-title">RingMe!</div>
      <div style="color: #6B7280; font-weight: 600;">Long Distance Interplanetary Terminal Cockpit</div>
    </div>
    <div style="background: var(--border-dark); color: #FFF; padding: 10px 22px; border-radius: 16px; font-weight: 800; font-size:15px; box-shadow: 0 4px 0 #CBD5E1;">
      🌍 My Space Node: ${S.user.city} (${getRemoteTime(S.user.tz)})
    </div>
  `;
  layer.appendChild(header);

  // Tab Selector Navigation Row
  var navBar = document.createElement('div');
  navBar.className = 'top-nav';
  var tabs = [
    { id: 'time', label: '🌍 Orbit Clocks' },
    { id: 'dial', label: '☎️ Retro Phone' },
    { id: 'board', label: '📌 Corkboard' },
    { id: 'config', label: '⚙️ Cockpit Setup' }
  ];
  tabs.forEach(function(t) {
    var tabBtn = document.createElement('button');
    tabBtn.className = 'nav-tab' + (S.activeTab === t.id ? ' active' : '');
    tabBtn.textContent = t.label;
    tabBtn.onclick = function() { S.activeTab = t.id; renderMainDeck(); };
    navBar.appendChild(tabBtn);
  });
  layer.appendChild(navBar);

  var viewGrid = document.createElement('div');
  viewGrid.className = 'main-layout';

  // VIEW 1: Time Overlap Matrix
  if(S.activeTab === 'time') {
    var leftSide = document.createElement('div');
    leftSide.className = 'card';
    leftSide.innerHTML = `
      <h3 style="font-weight:800; color:var(--primary-pink); margin-bottom:15px; font-size:20px;">Your Active Terminal</h3>
      <div style="display:flex; align-items:center; gap:20px; background:var(--bg-cozy); padding:20px; border-radius:20px; border:2px solid var(--border-dark);">
        <div style="font-size: 44px;">🌸</div>
        <div>
          <h2 style="font-size:24px; font-weight:800;">${S.user.name}</h2>
          <p style="color:#6B7280; font-weight:600;">Node Position: ${S.user.city}</p>
          <div style="font-size:24px; font-weight:800; margin-top:5px; color:var(--primary-pink);">${getRemoteTime(S.user.tz)}</div>
        </div>
      </div>
    `;
    viewGrid.appendChild(leftSide);

    var rightSide = document.createElement('div');
    rightSide.style.cssText = 'display:flex; flex-direction:column; gap:20px;';
    S.friends.forEach(function(f) {
      var fCard = document.createElement('div');
      fCard.className = 'card';
      fCard.style.marginBottom = '0';
      fCard.innerHTML = `
        <div style="position:absolute; top:20px; right:20px; background:#86EFAC; border:2px solid var(--border-dark); padding:4px 12px; border-radius:12px; font-size:12px; font-weight:800;">🔥 ${f.streak} Days Streak</div>
        <h3 style="font-weight:800; color:#C084FC; margin-bottom:15px; font-size:18px;">Remote Connection Bridge</h3>
        <div style="display:flex; align-items:center; gap:20px;">
          <div style="font-size: 44px;">${f.avatar}</div>
          <div>
            <h2 style="font-size:22px; font-weight:800;">${f.name}</h2>
            <p style="color:#6B7280; font-weight:600;">Location Base: ${f.city} (Code: ${f.code})</p>
            <div style="font-size:24px; font-weight:800; margin-top:5px; color:#9333EA;">${getRemoteTime(f.tz)}</div>
          </div>
        </div>
      `;
      rightSide.appendChild(fCard);
    });
    viewGrid.appendChild(rightSide);
  }
  // VIEW 2: Retro Phone Keypad
  else if(S.activeTab === 'dial') {
    var dialCard = document.createElement('div');
    dialCard.className = 'card full-width';
    dialCard.style.textAlign = 'center';
    dialCard.innerHTML = `
      <h2 class="screen-title">Vintage Private Communication Array</h2>
      <p style="color:#6B7280; margin-bottom:20px; font-weight:600;">Input your bestie's orbital node access code sequence to establish a link.</p>
      <div style="background:var(--bg-cozy); border:3px solid var(--border-dark); padding:16px; font-size:36px; font-weight:800; letter-spacing:8px; max-width:240px; margin:0 auto 24px; border-radius:20px; box-shadow:inset 0 4px 8px rgba(0,0,0,0.05); min-height:68px; color:var(--primary-pink);">
        ${S.dialDigits || '_ _'}
      </div>
    `;

    var dialPad = document.createElement('div');
    dialPad.className = 'dial-grid';
    ['1','2','3','4','5','6','7','8','9','✖','0','📞'].forEach(function(k) {
      var node = document.createElement('button');
      node.className = 'dial-node';
      if(k === '✖') node.className += ' action-btn';
      if(k === '📞') node.className += ' call-btn';
      node.textContent = k;
      node.onclick = function() {
        if(k === '✖') S.dialDigits = '';
        else if(k === '📞') {
          if(!S.dialDigits) return;
          var found = null;
          S.friends.forEach(function(f){ if(f.code === S.dialDigits) found = f; });
          if(found) {
            alert('🟢 Code Verified! Opening Quantum Subspace Bridge to ' + found.name + '...');
            window.open('https://meet.google.com/new', '_blank');
          } else {
            alert('❌ Signal Lost! The code sequence ' + S.dialDigits + ' does not match any known node terminal.');
          }
          S.dialDigits = '';
        } else {
          if(S.dialDigits.length < 4) S.dialDigits += k;
        }
        renderMainDeck();
      };
      dialPad.appendChild(node);
    });
    dialCard.appendChild(dialPad);
    viewGrid.appendChild(dialCard);
  }
  // VIEW 3: Corkboard
  else if(S.activeTab === 'board') {
    var boardCard = document.createElement('div');
    boardCard.className = 'card full-width';
    boardCard.innerHTML = `
      <h2 class="screen-title">Cozy Bestie Sticky Board</h2>
      <p style="color:#6B7280; margin-bottom:15px; font-weight:600;">Leave short spatial data records on your shared corkboard interface.</p>
    `;
    
    var bContainer = document.createElement('div');
    bContainer.className = 'board-container';
    S.board.forEach(function(p) {
      bContainer.innerHTML += `
        <div class="postit" style="background: ${p.bg};">
          <div>
            <div style="font-size:12px; font-weight:800; text-transform:uppercase; color:#6B7280; margin-bottom:8px; letter-spacing:0.5px;">📡 Node: ${p.from}</div>
            <div style="font-size:16px; font-weight:700; line-height:1.4;">${p.text}</div>
          </div>
          <div style="font-size:11px; font-weight:800; color:var(--primary-pink); text-align:right;">#${p.tag}</div>
        </div>
      `;
    });
    boardCard.appendChild(bContainer);
    viewGrid.appendChild(boardCard);
  }
  // VIEW 4: Account Configuration
  else if(S.activeTab === 'config') {
    var configCard = document.createElement('div');
    configCard.className = 'card full-width';
    configCard.innerHTML = `
      <h2 class="screen-title">Terminal Cockpit Configurations</h2>
      <p style="color:#6B7280; margin-bottom:24px; font-weight:600;">Calibrate your active orbital parameters and node locations below.</p>
      <div style="margin-bottom:20px; max-width:500px;">
        <label style="font-weight:800; font-size:14px; display:block; margin-bottom:8px;">Nickname Signature</label>
        <input type="text" id="cfg-name" class="cozy-input" value="${S.user.name}" style="margin-bottom:0;">
      </div>
      <div style="margin-bottom:30px; max-width:500px;">
        <label style="font-weight:800; font-size:14px; display:block; margin-bottom:8px;">Active Station City</label>
        <input type="text" id="cfg-city" class="cozy-input" value="${S.user.city}" style="margin-bottom:0;">
      </div>
      <button id="btn-save-cfg" class="btn-pink" style="margin-right:15px;">Apply Matrix Updates</button>
      <button id="btn-reset-app" class="btn-pink" style="background:#EF4444; box-shadow:0 6px 0 #991B1B;">Factory Reset Protocol 🔄</button>
    `;

    configCard.querySelector('#btn-save-cfg').onclick = function() {
      var n = document.getElementById('cfg-name').value.trim();
      var c = document.getElementById('cfg-city').value.trim();
      if(!n || !c) { alert('Parameters cannot be null.'); return; }
      S.user.name = n;
      S.user.city = c;
      S.user.tz = resolveTimezone(c);
      alert('Cockpit matrix configurations synchronized successfully!');
      renderMainDeck();
    };

    configCard.querySelector('#btn-reset-app').onclick = function() {
      if(confirm('Initiate system-wide hard reset? This will erase local orbital cache memory.')) {
        S.setupDone = false;
        S.step = 1;
        sync();
        renderOnboarding();
      }
    };

    viewGrid.appendChild(configCard);
  }

  layer.appendChild(viewGrid);
}

// ── App Start Execution Sequence ──
if(S.setupDone) {
  renderMainDeck();
} else {
  renderOnboarding();
}

// Global Core Ticker Engine (Smoothly updates time variables every 10 seconds)
setInterval(function() {
  if(S.setupDone && S.activeTab === 'time') {
    renderMainDeck();
  }
}, 10000);
</script>
</body>
</html>
